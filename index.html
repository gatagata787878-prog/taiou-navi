<style>
:root{
  --navy:#0B2545; --deep:#13315C; --blue:#1C7293; --accent:#E8A020; --teal:#2A9D8F;
  --bg:#eef2f6; --card:#ffffff; --ink:#15233a; --ink2:#5c708a; --ink3:#93a4ba;
  --line:#e4ebf2; --line2:#d3dde8;
  --okbg:#e9f6f3; --okline:#bfe5dd;
  --warnbg:#fdf3e7; --warn:#bd6b1c; --warnline:#f0d6ac;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;-webkit-text-size-adjust:100%;}
body{padding-bottom:40px;line-height:1.65;}
.wrap{max-width:640px;margin:0 auto;padding:0 12px;}
.hdr{background:var(--navy);color:#fff;padding:13px 0 12px;position:sticky;top:0;z-index:30;box-shadow:0 1px 8px rgba(11,37,69,.18);}
.hdr .wrap{display:flex;align-items:center;gap:9px;}
.logo{width:30px;height:30px;border-radius:8px;object-fit:cover;flex-shrink:0;display:block;}
.hdr-t{font-size:14px;font-weight:900;letter-spacing:.01em;white-space:nowrap;}
.hdr-s{font-size:10px;color:#9ec2d6;margin-top:1px;}
.hdr-cnt{margin-left:auto;font-size:10px;color:#9ec2d6;text-align:right;line-height:1.3;}
.hdr-cnt b{color:var(--accent);font-size:14px;font-weight:700;}
.searchbar{background:var(--navy);padding:0 0 12px;position:sticky;top:55px;z-index:29;}
.search{position:relative;}
.search input{width:100%;padding:13px 40px 13px 42px;border:none;border-radius:11px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.12);}
.search input:focus{outline:2px solid var(--teal);}
.search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--ink3);}
.search .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:var(--line);border-radius:50%;color:var(--ink2);font-size:15px;cursor:pointer;display:none;}
.search .clr.show{display:block;}
.chips{display:flex;gap:7px;overflow-x:auto;padding:11px 0 3px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;font-size:13px;font-weight:500;padding:7px 13px;border-radius:99px;border:1px solid var(--line2);background:#fff;color:var(--ink2);cursor:pointer;flex-shrink:0;font-family:inherit;display:flex;align-items:center;gap:6px;}
.chip .dot{width:8px;height:8px;border-radius:50%;}
.chip.active{color:#fff;border-color:transparent;}
.cnt{font-size:11px;color:var(--ink3);padding:11px 3px 4px;font-weight:500;}
/* VIEW TOGGLE */
.vtog{display:flex;gap:4px;background:rgba(255,255,255,.12);border-radius:10px;padding:3px;margin-bottom:10px;}
.vtog button{flex:1;border:none;background:none;color:#cfe0ea;font-family:inherit;font-size:13px;font-weight:700;padding:8px 0;border-radius:8px;cursor:pointer;}
.vtog button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.15);}
/* QUOTE TABLE */
.qt{margin-top:0;border:1px solid #e6d3b0;border-radius:11px;overflow:hidden;background:#fffaf2;}
.qt-hd{background:#faf0dc;padding:7px 12px;font-size:11px;color:var(--warn);font-weight:700;display:flex;justify-content:space-between;}
.qt-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid #f0e2c6;}
.qt-nm{flex:1;min-width:0;font-size:12.5px;color:var(--ink);line-height:1.4;}
.qt-up{font-size:9px;color:#fff;background:#d2691e;border-radius:4px;padding:1px 5px;margin-left:5px;white-space:nowrap;font-weight:700;}
.qt-pr{text-align:right;flex-shrink:0;}
.qt-genka{font-size:11px;color:var(--ink3);}
.qt-teiji{font-size:14px;color:var(--warn);font-weight:900;}
.qt-lbl{font-size:9px;color:var(--ink3);}
.qt-note{font-size:10.5px;color:var(--ink3);padding:8px 12px;border-top:1px solid #f0e2c6;line-height:1.5;}
/* PRODUCT (mitsu) ROW */
.prow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:7px;}
.pcat{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:#eef2f6;color:var(--ink2);white-space:nowrap;align-self:flex-start;}
.pnm{flex:1;min-width:0;font-size:13px;color:var(--ink);line-height:1.45;font-weight:500;}
.pup{font-size:9px;color:#fff;background:#d2691e;border-radius:4px;padding:1px 5px;margin-left:5px;white-space:nowrap;font-weight:700;}
.ppr{text-align:right;flex-shrink:0;}
.pg{font-size:11px;color:var(--ink3);}
.pt{font-size:15px;color:var(--warn);font-weight:900;}
.pl{font-size:9px;color:var(--ink3);}
.mitsu-note{background:#eef4f8;border:1px solid #d4e3ee;border-radius:10px;padding:10px 13px;font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:10px;}
.mitsu-note b{color:var(--blue);}
/* COMPANY INFO */
.info-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;box-shadow:0 1px 2px rgba(11,37,69,.05);}
.info-card.hl{border:1.5px solid var(--teal);background:#f3fbf9;}
.ic-l{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.ic-row{display:flex;align-items:flex-start;gap:10px;}
.ic-v{flex:1;min-width:0;font-size:14px;color:var(--ink);line-height:1.65;font-weight:500;word-break:break-all;}
.ic-v .sub{font-size:11px;color:var(--ink3);font-weight:400;}
.ic-copy{flex-shrink:0;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
.ic-copy:active{transform:scale(.95);}
.ic-copy.done{background:var(--teal);}
.info-name{font-size:18px;font-weight:900;color:var(--navy);text-align:center;padding:6px 0 12px;}
.info-tel{display:flex;gap:8px;}
.info-tel a{flex:1;text-align:center;background:var(--teal);color:#fff;text-decoration:none;border-radius:10px;padding:11px 0;font-weight:700;font-size:14px;}
.info-tel a.fax{background:var(--ink2);}

.item{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;overflow:hidden;box-shadow:0 1px 2px rgba(11,37,69,.05);}
.item-head{display:flex;align-items:flex-start;gap:11px;padding:14px 14px;cursor:pointer;user-select:none;}
.item-head:active{background:#f7fafc;}
.qbar{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;}
.item-main{flex:1;min-width:0;}
.item-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:5px;}
.item-q{font-size:15px;font-weight:700;color:var(--ink);line-height:1.45;}
.item-q .quote{color:var(--ink3);font-weight:900;}
.chev{color:var(--ink3);font-size:14px;flex-shrink:0;transition:transform .25s;margin-top:3px;}
.chev.open{transform:rotate(90deg);}
.detail{display:none;padding:0 14px 16px;}
.detail.open{display:block;}
.sec{margin-top:14px;}
.sec-l{font-size:11px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.sec-l .b{width:3px;height:14px;border-radius:2px;}
.ans{background:#f3f8fb;border:1px solid #d8e7f0;border-left:3px solid var(--blue);border-radius:9px;padding:11px 13px;font-size:14px;color:var(--ink);line-height:1.7;}
.ans b{color:var(--blue);}
.script{background:var(--okbg);border:1px solid var(--okline);border-radius:11px;padding:11px 12px 12px;margin-bottom:8px;position:relative;}
.script-l{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px;padding-right:78px;}
.script-t{font-size:14px;color:var(--ink);line-height:1.85;white-space:pre-wrap;}
.copy-btn{position:absolute;top:9px;right:9px;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;box-shadow:0 1px 3px rgba(42,157,143,.4);}
.copy-btn:active{transform:scale(.95);}
.copy-btn.done{background:var(--deep);}
.notes{background:var(--warnbg);border:1px solid var(--warnline);border-radius:11px;padding:11px 13px;}
.note{font-size:13px;color:var(--ink);line-height:1.7;display:flex;gap:8px;margin-bottom:6px;}
.note:last-child{margin-bottom:0;}
.note .m{color:var(--warn);font-weight:900;flex-shrink:0;}
.note.do .m{color:var(--teal);}
.note b{color:var(--ink);}
.esc{margin-top:0;background:#fef0ef;border:1px solid #f6cfca;border-radius:10px;padding:9px 12px;font-size:13px;color:#a23b2d;display:flex;gap:8px;align-items:flex-start;}
.esc .m{font-weight:900;flex-shrink:0;}
.esc b{color:#7d2a20;}
.refs-toggle{margin-top:10px;font-size:12px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer;padding:4px 0;font-weight:700;display:flex;align-items:center;gap:5px;}
.refs{display:none;margin-top:6px;}
.refs.open{display:block;}
.ref{font-size:12px;background:#f7fafc;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:6px;padding:8px 10px;margin-bottom:5px;color:var(--ink);}
.ref .tag{font-size:10px;color:#fff;background:var(--blue);padding:1px 7px;border-radius:99px;margin-right:6px;white-space:nowrap;}
.alt{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.alt-c{font-size:11px;color:var(--ink2);background:#eef2f6;border:1px solid var(--line);border-radius:99px;padding:3px 9px;}
.nores{text-align:center;color:var(--ink3);font-size:14px;padding:46px 16px;}
.nores .big{font-size:30px;margin-bottom:8px;}
.hl{background:#fff09e;border-radius:3px;padding:0 1px;}
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:all .25s;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.foot{text-align:center;font-size:10.5px;color:var(--ink3);margin-top:18px;line-height:1.7;padding:0 16px;}

/* ── 会社情報サブタブ ── */
.isub{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;margin-bottom:2px;}
.isub::-webkit-scrollbar{display:none;}
.isub button{white-space:nowrap;font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:99px;border:1px solid var(--line2);background:#fff;color:var(--ink2);cursor:pointer;flex-shrink:0;}
.isub button.on{background:var(--navy);color:#fff;border-color:transparent;}
.doc-sub{font-size:11px;color:var(--ink3);margin:0 2px 10px;}
.acc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.acc-h{display:flex;align-items:center;gap:9px;padding:13px 14px;cursor:pointer;user-select:none;}
.acc-h:active{background:#f6f9fc;}
.acc-n{flex:1;font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.4;}
.acc-c{font-size:13px;color:var(--ink3);transition:transform .2s;flex-shrink:0;}
.acc-c.open{transform:rotate(90deg);}
.acc-b{display:none;padding:0 14px 14px;}
.acc-b.open{display:block;}
.acc-b p{font-size:13px;color:#33465e;line-height:1.85;white-space:pre-wrap;margin-top:2px;}
.doc-foot{font-size:10.5px;color:var(--ink3);text-align:center;margin:6px 2px 4px;line-height:1.7;}
/* ── テスト（クイズ）── */
.qz-wrap{padding:2px 0;}
.qz-hero{background:var(--navy);color:#fff;border-radius:16px;padding:18px 16px;margin-bottom:14px;text-align:center;}
.qz-hero h3{font-size:16px;font-weight:900;margin-bottom:5px;}
.qz-hero p{font-size:11.5px;color:#bcd4e2;line-height:1.6;}
.qz-cats{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.qz-cat{background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:15px 12px;cursor:pointer;text-align:left;font-family:inherit;transition:transform .08s;}
.qz-cat:active{transform:scale(.97);}
.qz-cat .cn{font-size:14px;font-weight:800;color:var(--ink);}
.qz-cat .cc{font-size:11px;color:var(--ink3);margin-top:3px;}
.qz-cat .cd{width:26px;height:4px;border-radius:99px;margin-bottom:10px;}
/* play */
.qz-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.qz-back{font-family:inherit;font-size:12px;font-weight:700;color:var(--ink2);background:#fff;border:1px solid var(--line2);border-radius:99px;padding:7px 12px;cursor:pointer;}
.qz-prog{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden;}
.qz-prog>i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .3s;}
.qz-score{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:var(--teal);}
.qz-meta{font-size:11px;color:var(--ink3);margin-bottom:6px;}
.qz-q{background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:16px 15px;font-size:15px;font-weight:700;line-height:1.6;color:var(--ink);margin-bottom:12px;}
.qz-opts{display:flex;flex-direction:column;gap:9px;}
.qz-opt{display:flex;align-items:flex-start;gap:10px;text-align:left;font-family:inherit;font-size:13.5px;line-height:1.55;color:var(--ink);background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:13px 14px;cursor:pointer;transition:all .12s;}
.qz-opt:active{background:#f6f9fc;}
.qz-opt .mk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ink3);}
.qz-opt.correct{border-color:var(--teal);background:var(--okbg);}
.qz-opt.correct .mk{background:var(--teal);border-color:var(--teal);color:#fff;}
.qz-opt.wrong{border-color:#e0746a;background:#fdecea;}
.qz-opt.wrong .mk{background:#e0746a;border-color:#e0746a;color:#fff;}
.qz-opt.dim{opacity:.5;}
.qz-exp{background:#eef5ff;border:1px solid #cfe0f5;border-radius:12px;padding:12px 14px;margin-top:12px;font-size:12.5px;line-height:1.7;color:#234;}
.qz-exp b{color:var(--navy);}
.qz-next{width:100%;margin-top:12px;font-family:inherit;font-size:14px;font-weight:800;color:#fff;background:var(--navy);border:none;border-radius:12px;padding:14px;cursor:pointer;}
.qz-result{text-align:center;padding:10px 0;}
.qz-result .em{font-size:46px;margin-bottom:6px;}
.qz-result .sc{font-family:'Share Tech Mono',monospace;font-size:34px;font-weight:700;color:var(--navy);}
.qz-result .pct{font-size:13px;color:var(--ink3);margin:2px 0 14px;}
.qz-result .msg{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:18px;}
.qz-result .acts{display:flex;gap:9px;}
.qz-result .acts button{flex:1;font-family:inherit;font-size:13px;font-weight:800;border-radius:12px;padding:13px;cursor:pointer;border:none;}
.qz-retry{background:var(--navy);color:#fff;}
.qz-home{background:#fff;color:var(--ink2);border:1px solid var(--line2)!important;}


/* ── 会社情報 検索 ── */
.doc-tag{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--blue);border-radius:5px;padding:2px 8px;margin-bottom:5px;}
.srch-main{flex:1;min-width:0;}
.srch-snip{font-size:11.5px;color:var(--ink3);line-height:1.55;margin-top:4px;}
.srch-note{font-size:11.5px;color:var(--ink3);font-weight:700;margin:2px 2px 9px;}
.acc.srch .acc-h{align-items:flex-start;}
.nores2{text-align:center;color:var(--ink3);font-size:13px;padding:34px 14px;line-height:1.9;}

</style>
</head>

const INFODOCS={"shugyo": {"title": "就業規則", "sub": "正社員就業規則（令和4年2月1日施行）", "sections": [["総則・適用範囲", "雇用期間の定めがなく、職務内容・勤務地に制限のない基幹的業務に携わる正社員に適用。\n契約社員・パート・嘱託・無期転換者は別規則。\n個別労働契約がこの規則を下回らない範囲で、個別契約の条件を優先。\n法改正・経営環境の変化等により、法令に則って変更することがある。"], ["採用・試用期間", "選考は履歴書・身上書・卒業（見込）証明書等で書類選考＋面接。\n採用時の提出書類：誓約書／身元保証書／源泉徴収票／年金手帳／雇用保険被保険者証 等。\n身元保証：成年者1名（父母兄弟等）、責任上限額を明記、期間5年。\n試用期間は3か月（勤続年数に通算）。必要時は1回・最長6か月まで延長することがある。\n本採用拒否事由：出勤不良／協調性・意欲の欠如／能力不足／経歴詐称／健康状態 等。"], ["人事異動・出向・転籍", "業務都合により配置転換・転勤・職種変更・応援・一時異動を命じることがある（正当理由なく拒否不可）。\n転勤・職種変更は原則1週間前に内示。子の養育・家族介護に配慮。\n出向：労働条件が低下しないよう措置。転籍は本人同意が必要。\n退職者・異動者は速やかに業務引継ぎを完了（自己都合退職は退職日まで90日以上の引継ぎ期間）。"], ["労働時間・休憩・休日", "所定労働時間：実働8時間。始業10:00／終業20:00。休憩は合計2時間（現場作業の間に交替で付与）。\n現場作業は原則 直行直帰、移動時間は労働時間に含めない。\n変形労働時間制（1か月／1年単位）、フレックスタイム制を労使協定により実施可能。\n休日：各月6日＋年末年始3日・GW3日・夏期3日・会社指定日。業務都合で振替あり（前日までに通知）。"], ["時間外・休日労働", "業務上必要な場合、36協定を締結・届出のうえ時間外・休日労働を命じることがある。\n時間外・休日労働は事前に所属長の許可が必要。無許可の業務には通常・割増賃金とも支払わない。\n3歳未満の子を養育する者の請求時は所定外労働をさせない。小学校就学前の子の養育・介護者の請求時は時間外を月24時間・年150時間以内に制限、深夜労働もさせない。\n管理監督者・機密事務取扱者は時間外・休日の規定を適用しない。"], ["年次有給休暇", "入社日起算、基準日ごとに付与。付与日数：初回10／2回目11／3回目12／4回目14／5回目16／6回目18／7回目以降20日。\n前年所定労働日の8割以上出勤が対象。業務災害・産前産後・育介休・取得日は出勤扱い。\n有効期間は付与日から2年、古いものから消化。半日（4時間）単位取得も可（一部対象外）。\n取得手続：原則1週間前まで（遅くとも前々日）。1週間以上離れる場合は原則1か月前まで。\n年5日の時季指定義務あり（10日以上付与者）。事業の正常運営を妨げる場合は時季変更権を行使。"], ["女性・産前産後", "産前6週（多胎14週）・産後8週の休暇（無給）。産後6週経過後、本人請求＋医師許可で就業可。\n母性健康管理：妊娠中・産後1年の通院休暇、通勤緩和（時差出勤1時間以内）、休憩措置等（無給）。\n生理日の就業が著しく困難な場合は就労免除（無給）。生後1歳未満の育児時間 1日2回×30分（無給）。\n妊産婦の請求時は時間外・休日・深夜労働をさせず、変形労働時間制でも週40時間・1日8時間を超えない。"], ["休職・復職", "休職事由：業務外傷病で欠勤30日連続（同視含む）／通常の労務提供ができない／出向／その他会社が必要と認めた場合。\n休職期間：傷病6か月（情状により延長）／出向＝出向期間／その他＝会社が認める期間。\n休職期間中は無給（療養専念義務）。原則1か月に1回以上 自己の傷病等を報告。\n復職時は主治医の治癒証明（診断書）を提出。会社指定医の受診を命じることがある。\n休職期間満了までに事由が消滅しない場合は当然退職。復職後6か月以内の同一・類似事由再発は復職取消。"], ["退職・定年・解雇", "退職事由：死亡／休職満了／自己都合（会社承認日、承認なければ退職届2週間経過日）／行方不明30日／合意。\n合意退職：退職希望日の90日以上前に所属長へ届出。受理後は原則撤回不可。\n退職後の競業避止：役職者・企画職は離職後1年間、国内での競業・在職中知り得た顧客との取引を禁止。\n定年：満60歳（達した月の末日）。希望者は満65歳まで継続雇用（労働条件は個別契約で決定）。\n普通解雇事由：心身の障害で業務に耐えられない／能力不足・成績不良／勤務態度不良／協調性欠如／事業縮小 等。"], ["服務規律", "会社の方針・諸規程・指揮命令に従い、職場秩序の維持に努める。\n職場環境：火気の無断使用禁止／整理整頓／酒気帯び勤務禁止／勤務時間中の喫煙は所定場所のみ／賭博禁止。\n職務専念：会社許可なく兼業・営利業務をしない／勤務時間中の販売・政治・宗教活動の禁止／無断離席禁止。\n信用維持：会社の名誉・信用を害さない／取引先からの金品授受の禁止／酒気帯び・過労等での運転禁止。\n遅刻・早退・欠勤は所属長へ届出（傷病欠勤は診断書を求めることがある）。無断欠勤は年休振替を認めない。"], ["情報管理・SNS", "在職中・退職後を問わず営業秘密・会社業績に影響する情報を漏らさない。許可なく社外持出・私的記録をしない。\n私物PC・USBの会社機器への接続禁止／業務無関係ソフトのインストール禁止／貸与端末の私的利用禁止。\n会社は必要時、貸与端末内データの閲覧・GPSによる所在特定ができる。\nSNS（私的利用）：公式アカウントから発信しない／企業秘密・顧客情報・個人情報を発信しない／制服・社員証・ロゴ・商品画像を発信しない／誹謗中傷・虚偽を発信しない。違反時は懲戒・損害賠償の対象。"], ["表彰・懲戒", "表彰：技術優秀・業務熱心で模範／災害防止に功労／有益な発明改良／永年無事故継続勤務 等。\n懲戒の種類：譴責／減給／出勤停止（14労働日以内）／降格／諭旨解雇／懲戒解雇。\n減給は1事案につき平均賃金1日分の半額、総額は一賃金支払期の1/10を超えない範囲。\n懲戒事由：経歴詐称／無断欠勤・遅刻早退／指示命令違反／異動拒否／報告懈怠／秘密漏えい／ハラスメント／暴行脅迫／横領背任窃盗詐欺／会社への損害・信用失墜／無断兼業・競業 等。\n1年以内の再度の懲戒該当・同時2件以上は加重。教唆幇助も行為に準じて懲戒。"], ["ハラスメント禁止", "セクハラ／パワハラ／マタハラ・ケアハラに該当する行為・言動を禁止。\n会社は相談窓口を設置し、苦情・相談を受けたら速やかに報告・事実調査に着手、申立者の被害防止に配慮。\n相談・調査協力を理由とした不利益取扱いはしない。"], ["安全衛生・健康診断・災害補償", "安全衛生の諸規程・命令に従い労働災害防止に努める。\n健康診断：年1回の定期健診を受診（正当理由なく未受診は懲戒対象）。異常所見時は再検査・報告。\n就業禁止：伝染性疾病（新型コロナ含む）／心臓・腎臓・肺等で病勢悪化のおそれ 等（無給）。\n災害補償：業務上の傷病・死亡は労基法により療養・休業・障害・遺族補償等を行う。労災保険等の給付分は控除。"]]}, "chingin": {"title": "賃金規程", "sub": "正社員（令和4年2月1日施行）", "sections": [["賃金の構成", "①基本給 ②諸手当（試験／売上／役職／勤続／育児／特別／管理職）③割増賃金（時間外・休日・深夜）。"], ["支払方法・計算期間・控除", "計算期間：当月1日〜当月末日締め、翌月25日支払（休日は翌営業日）。\n通貨で直接本人に全額支払（本人同意で口座振込）。\n控除：源泉所得税／住民税／健康・介護・厚生年金保険料／雇用保険料／労使協定で定めたもの。\n死亡・災害等 非常時は支払日前でも既往労働分を請求により支払う。"], ["欠勤控除・休暇休業の賃金", "欠勤・遅刻・早退・私用外出は『基本給 ÷ 1か月平均所定労働時間 × 不就労時間（日数）』を控除。\n年次有給休暇：固定給対象者は減額しない／歩合給対象者は労基法12条の平均賃金を支払う。\n無給：公民権行使／産前産後／母性健康管理／生理日措置／育児時間・育介休／看護・介護休暇／休職期間。\n会社都合の休業は平均賃金の60%の休業手当を支給。"], ["給与改定", "管理職・固定給対象者は会社業績等を勘案し原則年1回改定（昇給・降給・据置）。\n能力・勤務成績・成果・勤務態度を人事考課で査定し基本給に反映。在籍1年未満は年齢・経験・能力で決定。"], ["基本給（固定給／歩合給）", "①管理職・固定給対象者：学歴・能力・経験・技能・職務内容を総合勘案して決定。\n②歩合給対象者：担当顧客件数・就労年数・社内試験（リミット5）の達成度に応じ歩合で決定（別紙『歩合給の計算方法』）。\n保障給：歩合給対象者には労基法27条の保障給（平均賃金の6割 等のいずれか高い額）を保障。"], ["諸手当", "試験手当：確認試験合格者へ支給。\n売上手当／役職手当／勤続手当：いずれも全額を時間外割増賃金の支給に代える（固定残業的性質）。見込みを上回る時間外があれば差額を別途支給。\n育児手当：中学生以下の子1人につき月15,000円。\n特別手当：成約率・仕入比率・販売・新規契約等の個人成績と会社業績を勘案し臨時支給。\n管理職手当：管理監督者へ支給（深夜労働見込み月30時間分の割増を含む。深夜以外の割増は支給しない）。"], ["交通費（ETC）の精算", "通勤の有料道路はETCカードで支払い。一月の総額が会社の基準額を超えた場合、超過分は従業員負担。\n超過割合に応じ、首都高普通車ETC基本料金上限額の1〜3倍を会社に支払うことで実費精算とみなす。"], ["割増賃金", "固定給対象者：時間外1.25／休日1.35／深夜0.25（算定基準賃金＝基本給＋試験＋勤続＋特別手当）。\n歩合給対象者：基本給/実労働時間×割増率 ＋（試験＋勤続＋特別手当）/月平均所定×割増率 等で算定。\n管理監督者（管理職手当支給者）には時間外・休日割増は支払わない（深夜割増は支給）。"], ["賞与", "会社業績・各人の査定・貢献度を考慮して支給（業績により支給しないことがある）。\n原則 毎年1月の会社が定める日に支給。算定対象期間は前年1/1〜12/31。\n支給対象：算定期間に全て在籍し、支給日に在籍、かつ支給日以降3か月以上在籍予定の者。"], ["歩合給の仕組み（概要）", "当月担当顧客数 × 担当1件あたり歩合率（就業年数・アシスタント／デザイナー別・件数で決定）＋リミット5加算。\n難易度・作業時間・複数担当・クレーム有無で1件を0.25〜3件に修正計上。出禁・減額/不払い顧客は計上しない。\n内勤業務は2時間ごとにS=1.25／A=1／B=0.75／C=0.5／D=0.25件で換算加算（日報等の提出が条件）。\n※詳細な歩合給早見表は別紙参照（本アプリでは省略）。"]]}, "ikuji": {"title": "育児・介護休業規程", "sub": "法改正対応版（2022年10月1日実施）", "sections": [["育児休業", "1歳未満の子と同居・養育する従業員が対象（日雇除く）。有期は一定の要件あり。\n労使協定で除外可：入社1年未満／1年（6か月）以内に雇用終了が明らか／週所定2日以下。\n原則 子が1歳まで（保育所に入れない等の事情で最長2歳まで延長可）。\n申出は原則 開始1か月前まで（延長申出は2週間前）。1歳までの休業は原則 一子につき2回まで分割可。"], ["出生時育児休業（産後パパ育休）", "産後休業をしておらず、子の出生日（出産予定日）から8週間以内の子を養育する従業員が対象。\n原則 開始2週間前までに申出。8週以内のうち4週間（28日）を限度に取得（2回まで分割、まとめて申出）。\n労使協定がある場合、休業中の就業も可能（就業日数・時間は休業期間の所定の半分以下が上限）。"], ["介護休業", "要介護状態（2週間以上 常時介護が必要）にある対象家族を介護する従業員が対象。\n対象家族：配偶者・父母・子・配偶者の父母・祖父母・兄弟姉妹・孫 等。\n対象家族1人につき通算93日まで、3回まで分割可。原則 開始2週間前までに申出。"], ["子の看護休暇・介護休暇", "看護休暇：小学校就学前の子の看護・予防接種・健診のため、子1人で年5日・2人以上で年10日（4/1〜3/31）。\n介護休暇：要介護家族1人で年5日・2人以上で年10日。\nいずれも1日単位・時間単位で取得可（無給／賃金規程により不就労分を控除）。"], ["所定外・時間外・深夜業の制限", "所定外労働の制限：3歳未満の子の養育・要介護家族の介護のため請求した場合、所定外労働をさせない。\n時間外労働の制限：小学校就学前の子・要介護家族のため、月24時間・年150時間を超える時間外をさせない。\n深夜業の制限：請求時、22時〜翌5時の深夜労働をさせない（同居家族の状況等で除外あり）。"], ["短時間勤務", "育児短時間：3歳未満の子を養育する従業員は申出により所定を原則 9:00〜16:00（休憩12-13時）に短縮。\n介護短時間：要介護家族1人につき、利用開始から3年で2回まで、同様に短縮。\n短縮分は不就労として控除した基本給＋諸手当全額を支給。賞与は短縮時間分を不支給、給与改定は通常勤務扱い。"], ["ハラスメント禁止・法令との関係", "本規程の制度の申出・利用に関して就業環境を害する言動を禁止（違反時は懲戒）。\n本規程に定めのない事項は育児・介護休業法その他の法令による。"]]}, "ccs": {"title": "安定期9ヶ年計画 / CCS", "sub": "全社会議資料（2021年）", "sections": [["安定期とは / 3原則", "創業期9ヶ年（業界TOP）→成長期9ヶ年（顧客基盤・ブランド最大化）を達成。次は安定期9ヶ年へ。\n安定期＝会社が安定した制度を確立する代わりに、全員が安定した仕事をもたらすトレード。最重要は『基礎力』。\n◆安定期3原則\n① 基礎をしっかりやる（社内ルール厳守・挨拶・報連相・掃除）\n② 愚痴・不満・ネガティブを言わず、ポジティブな解釈に変換して発信する\n③ 全員で会社の方針・企画に参加する。傍観者・評論家にならず主役として参加する。"], ["第一安定期：5つの基礎", "・安定的報酬や手当の実装（定期昇給・歩合給）\n・安定した技術＆基礎の追求（コケ残り・アポ・魚の死亡などの技術的基礎の見直し、教育システム確立）\n・安定した人格の追求（挨拶・お礼などの基礎〜コミュニケーション力まで再教育）\n・ポジティブな風土へ改革（愚痴・悪口・不満は社内厳禁、改善提案・チャレンジへ）\n・人員大幅採用と労働時間の改革（大量採用で現場の余裕を作り、既存スタッフを教育等へ連携）"], ["報酬制度まとめ", "①定期昇給：全社員対象。常識ある仕事をしていれば入社年数に応じ自動昇給（最大26万円＋試験1万＝27万保証）。リミット5の前払いの位置づけ。\n②歩合給（メンテ部）：現場件数に応じた残業手当。現場48件を全員のノルマとする。原則 会社預かりの財形（年2%）。\n③仕入削減：仕入削減はルール化。報酬は48件以上が対象、基準超過は件数に関わらず対象。\n④商品キックバック：最低20%の利益を乗せて販売。保険なし現場の魚は別料金。\n⑤年間ボーナス増減：解約・未納の状況、LINE報告等で変動。\n⑥育児手当：子1人につき成人まで月15,000円。⑦交通費バック廃止（経費削減で適正化）。\n⑧クオリティ管理手当：一時停止（マーケ・教育成果報酬等へ振替）。⑨サブリーダー手当：未納回収・契約書回収を重点。\n⑩メンテ部以外の昇給：各部門長が作成。⑪社長給：明るくモチベーション高く、通常業務以外で利益貢献し続ける人へ継続年数・独自性・利益に応じ別枠で支給（長期的に最も所得増が大きい部分）。"], ["所得シミュレーション（最低ライン）", "新人20万 → 2年後23万 → 4年後28万 → 6年後30万（ここまで自動昇給）。\n8年後 33〜35万（リミット5上位）→ 10年後 38〜45万（社長給）→ 10年前後〜 48〜65万（投資/運用）。\n※年間ボーナスは別。やるべき努力をすれば入社10年で最低 月40万円以上を目指せる制度。"], ["CCS（企業文化の基準）", "毎年1月・7月の決算発表でCCSの虫食い試験を実施。\n・経営理念：このアクアリウムの仕事に自信と優越感を持ち、対応や社内問題を通じて人間的に成長していくこと。\n・ミッション：家具インテリア＝水槽という選択肢を広く認知させ、選択の文化として根付かせる。\n・ヴィジョン：品質・価格・顧客数の3点で絶対的1位を強固にする。\n・顧客ターゲット：富裕層中心の個人、集客/差別化に困っている法人店舗等。"], ["AQUAの指標 / 行動指針", "◆AQUA\nA：Anticipate（先回りした対応・気配り・常に先手）\nQ：Question（想像でなく顧客・上司へヒヤリングする）\nU：Unique（面白みのある提案・キャラ）\nA：Adjust（自分の考えでなく常に相手のニーズに合わせる）\n◆行動指針：スピードは品質に優先する／挨拶・返事・期限・報連相・小さな約束を徹底／失敗は成長のチャンス、嘘・ごまかし・知ったフリは厳禁／聞くは一時の恥／ストレスは成長痛。\n◆お客様対応：一つ一つのアクションに付加価値を乗せて説明／クレームから逃げず期待値をくみとる／『やっぱり良かった』をゴールに。"], ["展開期（安定期の次）", "展開期＝基礎力と働き方改革ができれば事業を拡大・拡張できる段階。\n第一展開期：5人の社長を作り全国展開・人員と組織力の拡大。\n第二拡張期：新規事業・M&Aによる拡張。第三拡張期：株式上場・社会的存在意義の拡張。\n※新人研修等では外部の専門家による研修会も実施（入社2年以内対象）。"]]}, "hatarakikata": {"title": "選べる4つの働き方", "sub": "キャリア・モデル賃金", "sections": [["① 経営側／管理職／リーダー", "年収400〜1000万円（最大月80万円）。教育・問題解決・マネジメントが主業務。\nメンテには携わらず主に頭脳プレイヤー。時間や歩合でなく成果・結果が収益。\n結果や能力により役員へ。賞与あり。会社が責任を取り将来保証も得られる。\n※サブリーダーはこのポジションへの登竜門（リーダー2名の推薦が必要）。"], ["② 主力のメンテナンスデザイナー", "年収300〜550万円（最大月45万円）。完全歩合給で、やった分が即日給与反映。\n社内副業も給与評価に組込み。長く勤めるほど手当が上がる。社会保険・賞与あり、原則 解雇されない。\n守られている代わりに、会社の方針・業務依頼は原則 断れず協力義務がある。"], ["③ 契約社員", "0〜350万円（最大月30万円以下）。アルバイトと正社員の間。経験が浅くても変更可。\n基本給の概念がなく引受け量に応じて変動。社会保険あり・賞与なし。\n守られていない代わりに、会社からの追加業務依頼は断ることができる。"], ["④ 独立起業／代理店", "0円〜無限。会社対会社の取引で、自由に仕事量を決められる。基本報酬が高く節税で所得が上がる。\n将来的な保証は受けられず、ミスの責任は全面的に自分が負う。発注がない可能性・収入ゼロのリスクあり。\n※入社5年以上／リーダー2年／サブリーダー3年／リミット5デザイナー7割クリア のいずれかが条件。"], ["3構成で人生を長期的に支える", "・成長シート（リミット5／CCS）：何をすれば技術・知識スキルが上がるか、どんな態度・マインドで働くか。\n・ステップアップ基準：何をクリアすればどのポジションに上がれるか。\n・モデル賃金：どのポジションで所得いくらか、何年でどれくらいか。\n＋ 生涯にわたる人生保険（会社負担）を安定期のいずれかで実装予定（契約社員・独立を除く）。"], ["9ヶ年タイムライン", "創業期9ヶ年（業界TOP）→ 成長期9ヶ年（顧客基盤・ブランド最大化）→ 安定期9ヶ年（制度見直し）。\n第一安定期：2021-2023／第二：2023-2025／第三：2026-2028。\nその後 展開期（2029〜）：全国展開・新規事業・M&A・株式上場。"]]}};

let qzState=null;
function quizReset(){qzState=null;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderQuiz(bd){
  if(!qzState){ // カテゴリ選択
    let cards=QZCATS.map(c=>{
      const n=QUIZ.filter(q=>q.c===c.id).length;
      return `<button class="qz-cat" data-qc="${c.id}"><div class="cd" style="background:${c.c};"></div><div class="cn">${c.name}</div><div class="cc">全${n}問</div></button>`;
    }).join('');
    const total=QUIZ.length;
    bd.innerHTML=`<div class="qz-wrap">
      <div class="qz-hero"><h3>🎮 アクアリンク検定</h3><p>カテゴリを選んでスタート！選択式・全${total}問収録</p></div>
      <button class="qz-cat" data-qc="ALL" style="width:100%;margin-bottom:9px;"><div class="cd" style="background:var(--accent);"></div><div class="cn">⭐ ぜんぶ（ランダム）</div><div class="cc">全${total}問からランダム出題</div></button>
      <div class="qz-cats">${cards}</div></div>`;
    bd.querySelectorAll('.qz-cat').forEach(b=>{b.onclick=()=>startQuiz(b.dataset.qc,bd);});
    return;
  }
  drawQuizQ(bd);
}
function startQuiz(cat,bd){
  let pool=cat==='ALL'?QUIZ.slice():QUIZ.filter(q=>q.c===cat);
  pool=shuffle(pool);
  // 各問の選択肢もシャッフル（正答indexを追従）
  const qs=pool.map(q=>{
    const idx=q.o.map((_,i)=>i);
    const sh=shuffle(idx);
    return {q:q.q,e:q.e,c:q.c,o:sh.map(i=>q.o[i]),t:sh.indexOf(q.t)};
  });
  qzState={cat,qs,pos:0,score:0,answered:false};
  drawQuizQ(bd);
}
function drawQuizQ(bd){
  const S=qzState;const item=S.qs[S.pos];const total=S.qs.length;
  const pct=Math.round((S.pos/total)*100);
  if(S.pos>=total){drawQuizResult(bd);return;}
  let opts=item.o.map((o,i)=>`<button class="qz-opt" data-i="${i}"><span class="mk">${String.fromCharCode(65+i)}</span><span>${esc(o)}</span></button>`).join('');
  bd.innerHTML=`<div class="qz-wrap">
    <div class="qz-top"><button class="qz-back">← 戻る</button><div class="qz-prog"><i style="width:${pct}%"></i></div><div class="qz-score">${S.score}/${total}</div></div>
    <div class="qz-meta">第 ${S.pos+1} 問 / ${total}　・　${esc(item.c)}</div>
    <div class="qz-q">${esc(item.q)}</div>
    <div class="qz-opts">${opts}</div>
    <div id="qzAfter"></div>
  </div>`;
  bd.querySelector('.qz-back').onclick=()=>{qzState=null;renderQuiz(bd);};
  S.answered=false;
  bd.querySelectorAll('.qz-opt').forEach(btn=>{btn.onclick=()=>answerQuiz(parseInt(btn.dataset.i),bd);});
}
function answerQuiz(choice,bd){
  const S=qzState;if(S.answered)return;S.answered=true;
  const item=S.qs[S.pos];const opts=bd.querySelectorAll('.qz-opt');
  const correct=choice===item.t;
  if(correct)S.score++;
  opts.forEach((o,i)=>{
    o.style.pointerEvents='none';
    if(i===item.t)o.classList.add('correct');
    else if(i===choice)o.classList.add('wrong');
    else o.classList.add('dim');
  });
  // スコア更新
  const total=S.qs.length;
  bd.querySelector('.qz-score').textContent=S.score+'/'+total;
  const head=correct?'⭕ 正解！':'❌ 不正解';
  document.getElementById('qzAfter').innerHTML=
    `<div class="qz-exp"><b>${head}</b><br>${esc(item.e)}</div>`+
    `<button class="qz-next">${S.pos+1>=total?'結果を見る →':'次の問題 →'}</button>`;
  document.querySelector('.qz-next').onclick=()=>{S.pos++;drawQuizQ(bd);};
}
function drawQuizResult(bd){
  const S=qzState;const total=S.qs.length;const pct=Math.round(S.score/total*100);
  let em,msg;
  if(pct>=90){em='🏆';msg='お見事！ほぼ完璧です';}
  else if(pct>=70){em='🎉';msg='合格ライン！いい調子です';}
  else if(pct>=50){em='💪';msg='あと一歩、復習で伸びます';}
  else{em='📖';msg='もう一度チャレンジしてみよう';}
  bd.innerHTML=`<div class="qz-wrap"><div class="qz-result">
    <div class="em">${em}</div>
    <div class="sc">${S.score} / ${total}</div>
    <div class="pct">正答率 ${pct}%</div>
    <div class="msg">${msg}</div>
    <div class="acts"><button class="qz-retry">もう一回</button><button class="qz-home">カテゴリ選択</button></div>
  </div></div>`;
  bd.querySelector('.qz-retry').onclick=()=>startQuiz(S.cat,bd);
  bd.querySelector('.qz-home').onclick=()=>{qzState=null;renderQuiz(bd);};
}

    cntEl.style.display=isInfo?'none':'';
    if(view==='navi'){qEl.placeholder='例：魚 死んだ / ポンプ 止まった / 停電 / 請求';document.querySelector('.hdr-cnt').innerHTML='<b>'+D.length+'</b><br>トピック';}
    else if(view==='mitsu'){qEl.placeholder='商品名で検索：水草 / LED / クーラー / リバース';document.querySelector('.hdr-cnt').innerHTML='<b>'+PRODUCTS.length+'</b><br>商品';}
    else{qEl.placeholder='制度・ルールを検索：有給 / 残業 / 退職 / ハラスメント';document.querySelector('.hdr-cnt').innerHTML='<b>📋</b><br>会社情報';}
    if(!isInfo)buildChips();
    render();
  };
});
buildChips();render();
</script>
</body>
</html>
